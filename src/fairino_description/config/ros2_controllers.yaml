controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    dual_arm_position_controller:
      type: position_controllers/JointGroupPositionController

# --- MOVE THIS OUTSIDE controller_manager ---
dual_arm_position_controller:
  ros__parameters:
    joints:
      - left_joint1
      - left_joint2
      - left_joint3
      - left_joint4
      - left_joint5
      - left_joint6
      - right_joint1
      - right_joint2
      - right_joint3
      - right_joint4
      - right_joint5
      - right_joint6
    state_publish_rate: 50
    interface_name: position
    state_interfaces:
      - position
      - velocit
      - effort