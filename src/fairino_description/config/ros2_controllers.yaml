controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    dual_arm_position_controller:
      type: position_controllers/JointGroupPositionController

# --- MOVE THIS OUTSIDE controller_manager ---
dual_arm_position_controller:
  ros__parameters:
    joints:
      - left_joint1
      - left_joint2
      - left_joint3
      - left_joint4
      - left_joint5
      - left_joint6
      - right_joint1
      - right_joint2
      - right_joint3
      - right_joint4
      - right_joint5
      - right_joint6
    interface_name: position
    state_interfaces:
      - position
      - velocit
      - effort

    # Add this section
    gains:
      left_joint1: {p: 5.0, i: 0.0, d: 0.1}
      left_joint2: {p: 5.0, i: 0.0, d: 0.1}
      left_joint3: {p: 5.0, i: 0.0, d: 0.1}
      left_joint4: {p: 5.0, i: 0.0, d: 0.1}
      left_joint5: {p: 5.0, i: 0.0, d: 0.1}
      left_joint6: {p: 5.0, i: 0.0, d: 0.1}
      right_joint1: {p: 5.0, i: 0.0, d: 0.1}
      right_joint2: {p: 5.0, i: 0.0, d: 0.1}
      right_joint3: {p: 5.0, i: 0.0, d: 0.1}
      right_joint4: {p: 5.0, i: 0.0, d: 0.1}
      right_joint5: {p: 5.0, i: 0.0, d: 0.1}
      right_joint6: {p: 5.0, i: 0.0, d: 0.1}